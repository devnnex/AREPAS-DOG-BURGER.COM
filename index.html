<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AREPAS | DOG | BURGER 🍔 | MANIZALES | PERALONZO</title>
  <link rel="stylesheet" href="style.css">

 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

 <!-- 🧩 Favicon clásico -->
  <link rel="icon" type="image/png" href="./images/favicon.png">

  <!-- 📱 Ícono de app (iOS / Android) -->
  <link rel="apple-touch-icon" href="./images/favicon.png">

  <!-- 🧭 Configuración PWA -->
  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <meta name="apple-mobile-web-app-title" content="Arepas Dog Burger">

  <link rel="manifest" href="./manifest.json">

</head>
<body>
  <div id="app" class="app-container">

    <!-- ===== HEADER ===== -->
    <header class="topbar" role="banner">
      <button id="menu-btn" class="icon-btn" aria-label="Abrir menú">☰</button>
      <div class="brand">
        <img src="images/logo.png"  class="logo">
      </div>
      <button id="open-cart" class="cart-btn" aria-label="Abrir carrito">
        <span class="cart-ico">🛒</span>
        <span id="cart-count" class="cart-count">0</span>
      </button>
    </header>

    <!-- ===== MAIN ===== -->
    <main class="content" role="main">

      <!-- Categorías -->
      <nav class="categories" role="tablist" aria-label="Categorías">
        <!-- Buttons injected by JS -->
      </nav>

      <!-- Búsqueda -->
      <div class="search-row">
        <input id="search" type="search" placeholder="Buscar producto..." aria-label="Buscar productos">
      </div>

      <!-- Catálogo -->
      <section id="catalog" class="catalog fade-in" aria-live="polite">
        <!-- productos renderizados por JS -->
      </section>

    </main>

    <!-- ===== PRODUCT MODAL ===== -->
    <div id="product-modal" class="modal hidden" role="dialog" aria-modal="true">
      <div class="modal-panel">
        <div class="modal-details">
          <button class="modal-close icon-btn" id="modal-close" aria-label="Cerrar modal">✕</button>
          <div class="modal-scroll" id="modal-content"></div>
        </div>
      </div>
    </div>

    <!-- ===== CART DRAWER ===== -->
    <aside id="cart-drawer" class="cart-drawer hidden" aria-hidden="true" aria-label="Carrito">
      <header class="cart-header">
        <h3>Carrito</h3>
        <button id="close-cart" class="icon-btn" aria-label="Cerrar carrito">✕</button>
      </header>

      <div id="cart-items" class="cart-items" role="region" aria-live="polite"></div>

      <div class="cart-summary">
        <div class="row">
          <span>Subtotal</span>
          <strong id="cart-subtotal">$0</strong>
        </div>

        <div class="row total">
          <span>Total</span>
          <strong id="cart-total">$0</strong>
        </div>

        <button id="checkout-btn" class="btn-primary">Confirmar orden</button>
        <button id="clear-cart" class="btn-clear">Vaciar carrito</button>
      </div>
    </aside>

    <!-- ===== CHECKOUT MODAL ===== -->
    <div id="checkout-modal" class="checkout-overlay hidden" role="dialog" aria-modal="true">
      <div class="checkout-panel fade-in">

        <!-- Botón cerrar -->
        <button type="button" id="checkout-close" class="icon-btn close-btn" aria-label="Cerrar checkout">✕</button>

        <form id="checkout-form">
          <!-- 🔸 Paso 1: Datos básicos -->
          <div class="checkout-step active" id="step1">
            <label>Nombre
              <input name="name" type="text" required placeholder="Tu nombre">
            </label>

            <label>Teléfono
              <input name="phone" type="tel" required placeholder="Ej: 3001234567">
            </label>

            <div class="checkout-actions">
              <button type="button" id="next-step1" class="btn-primary">Continuar</button>
              <button type="button" id="back-to-cart" class="btn-secondary">Volver</button>
            </div>
          </div>

          <!-- 🔸 Paso 2: Detalles de entrega/pago -->
          <div class="checkout-step" id="step2">
            <div class="client-summary" id="client-summary"></div>

            <div class="radio-row" role="radiogroup" aria-label="Método de entrega">
  <label class="radio-btn">
    <input type="radio" name="method" value="recoger" checked>
    <span>Recoger</span>
  </label>
  <label class="radio-btn">
    <input type="radio" name="method" value="domicilio">
    <span>Domicilio</span>
  </label>
</div>


            <label id="address-label" class="hidden">Dirección
              <input name="address" type="text" placeholder="Dirección para entrega">
            </label>

            <label>Método de pago
              <select name="payment" id="payment-method" required>
                <option value="" disabled selected>Selecciona una opción</option>
                <option value="transferencia">Transferencia</option>
                <option value="efectivo">Efectivo</option>
              </select>
            </label>

             <div id="transfer-info" class="hidden transfer-box">
              <p><strong>La informacion:</strong> de banco</p>
              <p><strong>la enviaremos: por whatsapp</strong>
                <span id="account-number">feliz dia</span>
                <!-- <button type="button" id="copy-account" class="copy-btn">Copiar</button> -->
              </p>
              <p><strong></strong></p>  
                <!-- 🔹 QR de pago (Nequi + Bancolombia) 
  <div class="qr-box">

  <div class="qr-item">
    <img src="images/qr-nequi.png" alt="QR Nequi" class="qr-img">
    <p>
      Nequi
      <i class="fa-solid fa-download qr-download" data-img="images/qr-nequi.png"></i>
    </p>
  </div>

  <div class="qr-item">
    <img src="images/qr-bancolombia.png" alt="QR Bancolombia" class="qr-img">
    <p>
      Bancolombia
      <i class="fa-solid fa-download qr-download" data-img="images/qr-bancolombia.png"></i>
    </p>
  </div>

</div>-->
            </div>

            <label>Notas (opcional)
              <textarea name="notes" rows="2" placeholder="Ej: Sin cebolla"></textarea>
            </label>

            <div id="envio-row" class="checkout-row hidden">
              <span>Envío</span>
              <strong id="cart-delivery">$0</strong>
            </div>

            <div class="checkout-total">
              <span>Total</span>
              <strong id="cart-total-checkout">$0</strong>
            </div>

            <div class="checkout-actions">
              <button type="button" id="back-step2" class="btn-secondary">Atrás</button>
              <button type="submit" class="btn-primary">Confirmar pedido</button>
            </div>
          </div>
        </form>
      </div>
    </div>

  </div> <!-- cierre #app -->

  <!-- ===== MENÚ LATERAL ===== -->
  <div id="side-menu" class="side-menu hidden" role="dialog" aria-modal="true">
    <div class="side-menu-panel">

      <button id="close-menu" class="icon-btn close-menu" aria-label="Cerrar menú">
        <i class="fa-solid fa-x"></i>
      </button>

      <div class="menu-logo">
        <img src="images/logo.png" alt="Logo del negocio">
      </div>

      <ul class="social-links">
        <li>
          <a href="http://wa.me/573115990064" target="_blank">

        </li>
        <li>
          <a href="https://www.instagram.com/arepas_dog/" target="_blank">

          </a>
        </li>
        <li>
          <a href="#" target="_blank">

          <a href="#" target="_blank">
            <i class="fa-brands fa-tiktok"></i>
            <span>TikTok</span>
          </a>
        </li>
      </ul>
    </div>
  </div>


    <div id="floating-cart" class="cart-bubble hidden">
  <div class="bubble-content">
    <span class="bubble-count">0</span>
    <button id="open-cart-floating">
      🛒
    </button>
  </div>
</div>
